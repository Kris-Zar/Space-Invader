<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Space Invaders Web Demo</title>
  <link rel="icon" type="image/png" href="ufo.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      overflow: hidden; /* Prevent scrolling when full screen */
      color: white;
      font-family: sans-serif;
    }
    canvas {
      display: block; /* Remove inline spacing */
      background: #000;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game constants
    const CONSTANTS = {
      playerSpeed: 4, // Increased speed for better responsiveness
      bulletSpeed: 3,
      enemyYSpeed: 0.5,
      bossSpeed: 2,
      collisionDistance: 40,
      enemyScore: 10,
      bossScore: 50,
      bossSpawnInterval: 500
    };
    
    // Original Assets
    const playerImg = new Image();
    playerImg.src = 'spaceship.png'; 
    
    const bulletImg = new Image();
    bulletImg.src = 'bullet.png'; 
    
    const enemyImg = new Image();
    enemyImg.src = 'enemy.png'; 
    
    const bossImg = new Image();
    bossImg.src = 'boss.png'; 
    
    const bgAudio = new Audio('background.mp3');
    bgAudio.loop = true;
    
    const explosionAudio = new Audio('explosion.mp3');
    const winAudio = new Audio('winning.mp3');

    function startBackgroundMusic() {
      if (bgAudio.paused) {
        bgAudio.play().catch(() => {});
      }
    }

    function playSound(type) {
      if (type === 'explosion') {
        explosionAudio.currentTime = 0;
        explosionAudio.play().catch(() => {});
      } else if (type === 'win') {
        winAudio.currentTime = 0;
        winAudio.play().catch(() => {});
      }
    }

    // Game State
    let gameState = "START"; 
    let winTimer = 0;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('highscore')) || 0;
    
    // Key state
    const keys = { ArrowLeft: false, ArrowRight: false, Space: false };

    // Entities
    const player = { x: 0, y: 0, w: 64, h: 64 };
    const bullet = { x: 0, y: 0, w: 32, h: 32, state: "ready" };
    const enemy = { x: 0, y: 0, w: 32, h: 32 };
    const boss = { x: 0, y: 0, w: 128, h: 128, active: false, health: 50, hpMultiplier: 2, direction: 1 };
    
    const stars = [];
    
    // Responsive Canvas
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      // Update positions based on new height
      player.y = canvas.height - 80;
      
      // Re-initialize stars for new dimensions if needed
      if (stars.length === 0) {
        for (let i = 0; i < 100; i++) {
          stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height });
        }
      }
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); // Set initial size
    
    // Initial random placement within dynamic bounds
    player.x = (canvas.width / 2) - (player.w / 2);
    boss.x = Math.random() * canvas.width;
    boss.y = Math.random() * canvas.height;

    // Input Handling
    let bgMusicStarted = false;
    function initAudio() {
      if (!bgMusicStarted) {
        startBackgroundMusic();
        bgMusicStarted = true;
      }
    }

    window.addEventListener('click', initAudio);
    window.addEventListener('keydown', (e) => {
      initAudio();
      if (e.code === 'Enter' && gameState === 'START') {
        startGame();
      }
      if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
      if (e.code === 'ArrowRight') keys.ArrowRight = true;
      if (e.code === 'Space') keys.Space = true;
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
      if (e.code === 'ArrowRight') keys.ArrowRight = false;
      if (e.code === 'Space') keys.Space = false;
    });

    function spawnEnemy() {
      enemy.x = Math.random() * (canvas.width - enemy.w); 
      enemy.y = Math.random() * (canvas.height * 0.25); // Spawn in top 25%
    }

    function startGame() {
      gameState = "PLAYING";
      score = 0;
      player.x = (canvas.width / 2) - (player.w / 2);
      bullet.state = "ready";
      boss.active = false;
      boss.hpMultiplier = 2;
      spawnEnemy();
    }

    function isCollision(x1, y1, x2, y2) {
      const distance = Math.hypot(x1 - x2, y1 - y2);
      return distance < CONSTANTS.collisionDistance;
    }

    function update() {
      // 1. Stars drift
      for (let star of stars) {
        star.y += 1;
        if (star.y > canvas.height) {
          star.x = Math.random() * canvas.width;
          star.y = 0;
        }
      }

      if (gameState !== "PLAYING") return;

      // 2. Boss Spawn
      if (score % CONSTANTS.bossSpawnInterval === 0 && score !== 0 && !boss.active) {
        boss.active = true;
        boss.health = 50 * boss.hpMultiplier;
        boss.x = Math.random() * (canvas.width - boss.w);
        boss.y = 100;
      }

      // 3. Boss Movement
      if (boss.active) {
        boss.x += boss.direction * CONSTANTS.bossSpeed;
        if (boss.x <= 0 || boss.x >= (canvas.width - boss.w)) {
          boss.direction *= -1;
        }
      }

      // 4. Boss Collision
      if (isCollision(boss.x, boss.y, bullet.x, bullet.y) && bullet.state === 'fire') {
        bullet.state = 'ready';
        bullet.y = player.y;
        boss.health -= 10;
        if (boss.health <= 0) {
          score += CONSTANTS.bossScore;
          playSound('explosion');
          boss.active = false;
          boss.hpMultiplier *= 2; 
          playSound('win');
        }
      }

      // 5. Player Movement
      if (keys.ArrowLeft) player.x -= CONSTANTS.playerSpeed;
      if (keys.ArrowRight) player.x += CONSTANTS.playerSpeed;

      // Keep player within dynamic bounds
      if (player.x < 0) player.x = 0;
      else if (player.x > canvas.width - player.w) player.x = canvas.width - player.w;

      // 6. Fire Bullet
      if (keys.Space && bullet.state === "ready") {
        bullet.x = player.x;
        bullet.y = player.y;
        bullet.state = "fire";
      }

      // 7. Bullet Movement
      if (bullet.state === "fire") {
        bullet.y -= CONSTANTS.bulletSpeed;
        if (bullet.y <= 0) {
          bullet.state = "ready";
        }
      }

      // 8. Enemy Collision
      if (isCollision(enemy.x, enemy.y, bullet.x, bullet.y) && bullet.state === 'fire') {
        bullet.state = 'ready';
        bullet.y = player.y;
        score += CONSTANTS.enemyScore;
        if (score > highScore) {
          highScore = score;
        }
        spawnEnemy();
        playSound('explosion');
      }

      // 9. Enemy Vertical Movement
      enemy.y += CONSTANTS.enemyYSpeed;
      if (enemy.y > canvas.height) {
        spawnEnemy();
      }

      // 10. Game Over Condition
      if (enemy.y >= player.y) {
        localStorage.setItem('highscore', highScore);
        if (score === highScore && score !== 0) {
          gameState = "WIN";
          winTimer = performance.now();
        } else {
          gameState = "GAMEOVER";
        }
      }
    }

    function draw() {
      // Clear screen
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw stars
      ctx.fillStyle = "white";
      for (let star of stars) {
        ctx.beginPath();
        ctx.arc(star.x, star.y, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      if (gameState === "START") {
        ctx.fillStyle = "white";
        ctx.font = "64px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Press ENTER to Start", canvas.width / 2, canvas.height / 2);
        ctx.textAlign = "left"; // reset for UI
        return;
      }
      
      if (gameState === "WIN") {
        ctx.fillStyle = "yellow";
        ctx.font = "64px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("New High Score!", canvas.width / 2, canvas.height / 2);
        ctx.textAlign = "left";
        
        if (performance.now() - winTimer > 3000) { 
          gameState = "GAMEOVER";
        }
        return;
      }

      // Draw Boss
      if (boss.active) {
        try { ctx.drawImage(bossImg, boss.x, boss.y, boss.w, boss.h); } catch (e) {}
      }

      // Draw Enemy
      try { ctx.drawImage(enemyImg, enemy.x, enemy.y, enemy.w, enemy.h); } catch (e) {}

      // Draw Player
      try { ctx.drawImage(playerImg, player.x, player.y, player.w, player.h); } catch (e) {}

      // Draw Bullet
      if (bullet.state === "fire") {
        try { ctx.drawImage(bulletImg, bullet.x + 16, bullet.y, bullet.w, bullet.h); } catch (e) {}
      }

      // Draw UI
      ctx.fillStyle = "white";
      ctx.font = "32px sans-serif";
      ctx.fillText(`Score: ${score}  High Score: ${highScore}`, 10, 30);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Start rendering loop
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
